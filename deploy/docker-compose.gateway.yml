name: grtblog-gateway
services:
  nginx:
    image: nginx:1.27-alpine
    container_name: grtblog-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./storage/html:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - grtblog-internal
    restart: unless-stopped

networks:
  grtblog-internal:
    external: true
    name: grtblog-internal
