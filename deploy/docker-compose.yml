name: grtblog
services:
  nginx:
    image: nginx:1.27-alpine
    container_name: grtblog-nginx
    depends_on:
      server:
        condition: service_started
      renderer:
        condition: service_started
      admin:
        condition: service_started
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - html_data:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - grtblog-internal
    restart: unless-stopped

  server:
    image: grtblog-server:local
    build:
      context: ..
      dockerfile: deploy/docker/server.Dockerfile
    container_name: grtblog-server
    environment:
      APP_ENV: production
      APP_PORT: "8080"
      APP_PROXY_HEADER: "X-Forwarded-For"
      APP_TRUSTED_PROXY_CHECK: "true"
      APP_IP_VALIDATION: "true"
      DB_DRIVER: postgres
      DB_DSN: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-grtblog}?sslmode=disable"
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      REDIS_DB: "0"
      REDIS_PREFIX: "${REDIS_PREFIX:-grtblog:}"
      HTMLSNAPSHOT_BASE_URL: "http://renderer:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      renderer:
        condition: service_started
    volumes:
      - html_data:/app/storage/html
      - uploads_data:/app/storage/uploads
      - geoip_data:/app/storage/geoip
    networks:
      - grtblog-internal
    restart: unless-stopped

  migrate:
    image: grtblog-server:local
    container_name: grtblog-migrate
    environment:
      DB_DSN: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-grtblog}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "goose",
        "-table",
        "public.goose_db_version",
        "-dir",
        "/app/migrations",
        "postgres",
        "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-grtblog}?sslmode=disable",
        "up"
      ]
    networks:
      - grtblog-internal
    restart: "no"

  renderer:
    image: grtblog-renderer:local
    build:
      context: ..
      dockerfile: deploy/docker/web.Dockerfile
    container_name: grtblog-renderer
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3000"
      INTERNAL_API_BASE_URL: "http://server:8080/api/v2"
    networks:
      - grtblog-internal
    restart: unless-stopped

  admin:
    image: grtblog-admin:local
    build:
      context: ..
      dockerfile: deploy/docker/admin.Dockerfile
    container_name: grtblog-admin
    networks:
      - grtblog-internal
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: grtblog-postgres
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-grtblog}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-me}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-grtblog}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - grtblog-internal
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: grtblog-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - grtblog-internal
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  html_data:
  uploads_data:
  geoip_data:

networks:
  grtblog-internal:
    name: grtblog-internal
    driver: bridge
