name: Publish Docker Images

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_OWNER: grtsinry43
  DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  CNB_REPO: grtsinry43/grtblog
  CNB_ACCESS_TOKEN: ${{ secrets.CNB_ACCESS_TOKEN }}

jobs:
  # ── 1. Parse tag once, share outputs with downstream jobs ──
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.taginfo.outputs.version }}
      channel: ${{ steps.taginfo.outputs.channel }}
      stage: ${{ steps.taginfo.outputs.stage }}
      major: ${{ steps.taginfo.outputs.major }}
      minor: ${{ steps.taginfo.outputs.minor }}
      ref_name: ${{ steps.taginfo.outputs.ref_name }}
    steps:
      - name: Determine tag info
        id: taginfo
        run: |
          REF_NAME="${GITHUB_REF_NAME}"
          VERSION="${REF_NAME#v}"
          if [[ "$VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "stage=stable" >> "$GITHUB_OUTPUT"
            echo "major=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "minor=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)-(alpha|beta|rc)\.([0-9]+)$ ]]; then
            echo "channel=preview" >> "$GITHUB_OUTPUT"
            echo "stage=${BASH_REMATCH[4]}" >> "$GITHUB_OUTPUT"
            echo "major=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "minor=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported tag format: $REF_NAME" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "ref_name=$REF_NAME" >> "$GITHUB_OUTPUT"

  # ── 2. Build each image × platform natively (no QEMU) ──
  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: grtblog-server
            dockerfile: deploy/docker/server.Dockerfile
          - name: grtblog-renderer
            dockerfile: deploy/docker/web.Dockerfile
        platform:
          - os: linux/amd64
            runner: ubuntu-latest
          - os: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.platform.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare platform pair
        run: |
          platform="${{ matrix.platform.os }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.platform.os }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.ref.name=${{ needs.prepare.outputs.ref_name }}
            org.opencontainers.image.title=${{ matrix.image.name }}
          build-args: |
            APP_VERSION=${{ needs.prepare.outputs.version }}
            BUILD_COMMIT=${{ github.sha }}
          provenance: false
          sbom: false
          outputs: type=image,"name=${{ env.GHCR_REGISTRY }}/${{ env.GHCR_OWNER }}/${{ matrix.image.name }}",push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.image.name }}-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── 3. Merge per-platform digests into multi-arch manifest ──
  merge:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - grtblog-server
          - grtblog-renderer
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.image }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ needs.prepare.outputs.channel == 'stable' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: imagetags
        env:
          CHANNEL: ${{ needs.prepare.outputs.channel }}
          IMAGE_NAME: ${{ matrix.image }}
          MAJOR: ${{ needs.prepare.outputs.major }}
          MINOR: ${{ needs.prepare.outputs.minor }}
          STAGE: ${{ needs.prepare.outputs.stage }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail

          tags=()
          image_refs=("${GHCR_REGISTRY}/${GHCR_OWNER}/${IMAGE_NAME}")
          dockerhub_namespace="${DOCKERHUB_NAMESPACE:-${DOCKERHUB_USERNAME:-}}"
          if [[ "$CHANNEL" == "stable" && -n "${dockerhub_namespace}" && -n "${DOCKERHUB_USERNAME:-}" && -n "${DOCKERHUB_TOKEN:-}" ]]; then
            image_refs+=("docker.io/${dockerhub_namespace}/${IMAGE_NAME}")
          fi
          for ref in "${image_refs[@]}"; do
            tags+=("-t" "${ref}:${VERSION}")
            if [[ "$CHANNEL" == "stable" ]]; then
              tags+=("-t" "${ref}:${MAJOR}.${MINOR}")
              tags+=("-t" "${ref}:stable")
              tags+=("-t" "${ref}:latest")
            else
              tags+=("-t" "${ref}:preview")
              tags+=("-t" "${ref}:${STAGE}")
            fi
          done

          echo "tags=${tags[*]}" >> "$GITHUB_OUTPUT"

      - name: Create manifest list & push
        working-directory: /tmp/digests
        env:
          GHCR_IMAGE: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_OWNER }}/${{ matrix.image }}
        run: |
          docker buildx imagetools create \
            ${{ steps.imagetags.outputs.tags }} \
            $(printf "${GHCR_IMAGE}@sha256:%s " *)

  # ── 4. Mirror stable images from GHCR inside CNB ──
  mirror-cnb:
    if: ${{ needs.prepare.outputs.channel == 'stable' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [prepare, merge]
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve source image digests
        id: digests
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail

          resolve_digest() {
            local image="$1"
            docker buildx imagetools inspect \
              "${GHCR_REGISTRY}/${GHCR_OWNER}/${image}:${VERSION}" \
              --format '{{json .Manifest}}' | jq -er '.digest'
          }

          server_digest="$(resolve_digest grtblog-server)"
          renderer_digest="$(resolve_digest grtblog-renderer)"
          echo "server_digest=$server_digest" >> "$GITHUB_OUTPUT"
          echo "renderer_digest=$renderer_digest" >> "$GITHUB_OUTPUT"

      - name: Trigger CNB image mirror
        id: trigger
        env:
          CNB_TOKEN: ${{ env.CNB_ACCESS_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare.outputs.ref_name }}
          RENDERER_DIGEST: ${{ steps.digests.outputs.renderer_digest }}
          SERIES: ${{ needs.prepare.outputs.major }}.${{ needs.prepare.outputs.minor }}
          SERVER_DIGEST: ${{ steps.digests.outputs.server_digest }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          : "${CNB_TOKEN:?CNB_ACCESS_TOKEN is required for stable releases}"

          payload="$(jq -cn \
            --arg branch main \
            --arg event api_trigger_mirror_images \
            --arg title "Mirror release images ${RELEASE_TAG}" \
            --arg version "$VERSION" \
            --arg series "$SERIES" \
            --arg serverDigest "$SERVER_DIGEST" \
            --arg rendererDigest "$RENDERER_DIGEST" \
            '{
              branch: $branch,
              event: $event,
              title: $title,
              env: {
                VERSION: $version,
                SERIES: $series,
                SERVER_DIGEST: $serverDigest,
                RENDERER_DIGEST: $rendererDigest
              }
            }')"

          response="$(curl --silent --show-error --fail-with-body \
            --request POST \
            --url "https://api.cnb.cool/${CNB_REPO}/-/build/start" \
            --header "Authorization: Bearer ${CNB_TOKEN}" \
            --header 'Accept: application/vnd.cnb.api+json' \
            --header 'Content-Type: application/json' \
            --data "$payload")"

          if [[ "$(jq -r '.success' <<< "$response")" != "true" ]]; then
            echo "CNB rejected the mirror build request" >&2
            jq . <<< "$response" >&2
            exit 1
          fi

          sn="$(jq -er '.sn' <<< "$response")"
          build_url="$(jq -er '.buildLogUrl' <<< "$response")"
          echo "sn=$sn" >> "$GITHUB_OUTPUT"
          echo "build_url=$build_url" >> "$GITHUB_OUTPUT"
          echo "CNB mirror build: $build_url" >> "$GITHUB_STEP_SUMMARY"

      - name: Wait for CNB image mirror
        env:
          BUILD_URL: ${{ steps.trigger.outputs.build_url }}
          CNB_TOKEN: ${{ env.CNB_ACCESS_TOKEN }}
          SN: ${{ steps.trigger.outputs.sn }}
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 3300))

          while (( SECONDS < deadline )); do
            response="$(curl --silent --show-error --fail-with-body \
              --retry 5 \
              --retry-all-errors \
              --retry-delay 3 \
              --request GET \
              --url "https://api.cnb.cool/${CNB_REPO}/-/build/status/${SN}" \
              --header "Authorization: Bearer ${CNB_TOKEN}" \
              --header 'Accept: application/vnd.cnb.api+json')"
            status="$(jq -r '.status // "unknown"' <<< "$response" | tr '[:upper:]' '[:lower:]')"
            echo "CNB mirror status: $status"

            case "$status" in
              success)
                echo "CNB image mirror completed: $BUILD_URL" >> "$GITHUB_STEP_SUMMARY"
                exit 0
                ;;
              error|failed|failure|cancel|canceled|cancelled)
                echo "CNB image mirror failed: $BUILD_URL" >&2
                exit 1
                ;;
            esac

            sleep 15
          done

          echo "Timed out waiting for CNB image mirror: $BUILD_URL" >&2
          exit 1

  # ── 5. GitHub Release (stable = release, preview = prerelease) ──
  create-github-release:
    runs-on: ubuntu-latest
    needs: [prepare, merge, mirror-cnb]
    if: >-
      ${{
        always() &&
        needs.prepare.result == 'success' &&
        needs.merge.result == 'success' &&
        (needs.prepare.outputs.channel != 'stable' || needs.mirror-cnb.result == 'success')
      }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check release notes file
        id: releasefile
        run: |
          RELEASE_FILE="docs/releases/${GITHUB_REF_NAME}.md"
          if [[ -f "$RELEASE_FILE" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "path=$RELEASE_FILE" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release with notes file
        if: steps.releasefile.outputs.exists == 'true'
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.releasefile.outputs.path }}
          draft: false
          prerelease: ${{ needs.prepare.outputs.channel == 'preview' }}
          tag_name: ${{ github.ref_name }}

      - name: Publish GitHub Release with autogenerated notes
        if: steps.releasefile.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          prerelease: ${{ needs.prepare.outputs.channel == 'preview' }}
          tag_name: ${{ github.ref_name }}
