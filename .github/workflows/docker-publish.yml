name: Publish Docker Images

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: grtsinry43

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: grtblog-server
            dockerfile: deploy/docker/server.Dockerfile
          - image: grtblog-renderer
            dockerfile: deploy/docker/web.Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tag type
        id: tagtype
        run: |
          REF_NAME="${GITHUB_REF_NAME}"            # e.g. v2.0.0-alpha.1 or v1.2.3
          VERSION="${REF_NAME#v}"                   # strip leading v

          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Docker metadata (prerelease)
        if: steps.tagtype.outputs.prerelease == 'true'
        id: meta-pre
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.tagtype.outputs.version }}

      - name: Docker metadata (stable)
        if: steps.tagtype.outputs.prerelease == 'false'
        id: meta-stable
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.ref_name }}
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-pre.outputs.tags || steps.meta-stable.outputs.tags }}
          labels: ${{ steps.meta-pre.outputs.labels || steps.meta-stable.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.tagtype.outputs.version }}
            BUILD_COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
