name: 功能请求
description: 提出一个新功能或改进建议
labels: ["enhancement"]
body:
  - type: dropdown
    id: module
    attributes:
      label: 涉及模块
      options:
        - Server (Go/Fiber)
        - Admin (Vue)
        - Web (SvelteKit)
        - Docker / 部署
        - 其他
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 问题 / 动机
      description: 描述你遇到的问题或提出该功能的动机
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 描述你希望实现的方案
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 描述你考虑过的其他方案
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他相关的上下文或截图
    validations:
      required: false
